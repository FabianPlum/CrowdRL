name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-packages --extra dev
      # Replace CUDA torch with CPU-only build (CI runners have no GPU)
      - run: uv pip install torch==2.6.0 --index-url https://download.pytorch.org/whl/cpu --reinstall
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-packages --extra dev
      # Replace CUDA torch with CPU-only build (CI runners have no GPU)
      - run: uv pip install torch==2.6.0 --index-url https://download.pytorch.org/whl/cpu --reinstall
      - run: uv run --no-sync pytest --tb=short -q
