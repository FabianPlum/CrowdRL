<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<style>
  text { font-family: "Anthropic Sans", system-ui, -apple-system, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
  .ts { font-size: 12px; font-weight: 400; fill: #666; }
  .arr { stroke: #888; stroke-width: 1.5; }

  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }

  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
  .c-purple .th { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }

  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
  .c-blue .th { fill: #0C447C; }
  .c-blue .ts { fill: #185FA5; }

  .c-coral rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
  .c-coral .th { fill: #712B13; }
  .c-coral .ts { fill: #993C1D; }

  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
  .c-gray .th { fill: #444441; }
  .c-gray .ts { fill: #5F5E5A; }
</style>

<!-- Foundation layer label -->
<text class="ts" x="340" y="536" text-anchor="middle" opacity="0.5">shared foundation — written once, used everywhere</text>

<!-- crowdrl-core (bottom, wide) -->
<g class="c-teal">
  <rect x="60" y="440" width="560" height="80" rx="14"/>
  <text class="th" x="340" y="468" text-anchor="middle" dominant-baseline="central">crowdrl-core</text>
  <text class="ts" x="340" y="490" text-anchor="middle" dominant-baseline="central">geometry · navmesh · raycasting · observation builder · action interpreter · collision</text>
</g>

<!-- crowdrl-env (middle left) -->
<g class="c-purple">
  <rect x="60" y="290" width="260" height="110" rx="12"/>
  <text class="th" x="190" y="322" text-anchor="middle" dominant-baseline="central">crowdrl-env</text>
  <text class="ts" x="190" y="344" text-anchor="middle" dominant-baseline="central">Gymnasium interface</text>
  <text class="ts" x="190" y="362" text-anchor="middle" dominant-baseline="central">procedural generator (tiers 0–5)</text>
  <text class="ts" x="190" y="380" text-anchor="middle" dominant-baseline="central">reward modules · solvability verifier</text>
</g>

<!-- crowdrl-jupedsim (middle right) -->
<g class="c-coral">
  <rect x="360" y="290" width="260" height="110" rx="12"/>
  <text class="th" x="490" y="322" text-anchor="middle" dominant-baseline="central">crowdrl-jupedsim</text>
  <text class="ts" x="490" y="344" text-anchor="middle" dominant-baseline="central">OperationalModel adapter</text>
  <text class="ts" x="490" y="362" text-anchor="middle" dominant-baseline="central">obs builder from JPS agent state</text>
  <text class="ts" x="490" y="380" text-anchor="middle" dominant-baseline="central">ONNX policy inference · benchmarks</text>
</g>

<!-- crowdrl-train (top left) -->
<g class="c-blue">
  <rect x="60" y="130" width="260" height="110" rx="12"/>
  <text class="th" x="190" y="162" text-anchor="middle" dominant-baseline="central">crowdrl-train</text>
  <text class="ts" x="190" y="184" text-anchor="middle" dominant-baseline="central">MAPPO training loop</text>
  <text class="ts" x="190" y="202" text-anchor="middle" dominant-baseline="central">curriculum manager</text>
  <text class="ts" x="190" y="220" text-anchor="middle" dominant-baseline="central">policy export (ONNX / TorchScript)</text>
</g>

<!-- JuPedSim (top right, external) -->
<g class="c-gray">
  <rect x="360" y="130" width="260" height="110" rx="12" stroke-dasharray="4 3"/>
  <text class="th" x="490" y="162" text-anchor="middle" dominant-baseline="central">JuPedSim</text>
  <text class="ts" x="490" y="184" text-anchor="middle" dominant-baseline="central">existing simulation engine</text>
  <text class="ts" x="490" y="202" text-anchor="middle" dominant-baseline="central">CollisionFreeSpeedModel, SFM, …</text>
  <text class="ts" x="490" y="220" text-anchor="middle" dominant-baseline="central">+ new: LearnedPolicyModel</text>
</g>

<!-- Dependency arrows (bottom-up) -->
<line x1="190" y1="440" x2="190" y2="402" class="arr" marker-end="url(#arrow)" stroke-width="1.5"/>
<line x1="490" y1="440" x2="490" y2="402" class="arr" marker-end="url(#arrow)" stroke-width="1.5"/>
<line x1="190" y1="290" x2="190" y2="242" class="arr" marker-end="url(#arrow)" stroke-width="1.5"/>
<line x1="490" y1="290" x2="490" y2="242" class="arr" marker-end="url(#arrow)" stroke-width="1.5"/>

<!-- Cross-arrow: train exports policy → jupedsim-adapter loads it -->
<path d="M322 185 L358 185" fill="none" class="arr" marker-end="url(#arrow)" stroke-width="1.5" stroke-dasharray="4 3"/>
<text class="ts" x="340" y="178" text-anchor="middle">.onnx</text>

<!-- Labels on left/right margins -->
<text class="ts" x="40" y="56" text-anchor="middle" opacity="0.4">training</text>
<text class="ts" x="40" y="72" text-anchor="middle" opacity="0.4">path</text>
<text class="ts" x="640" y="56" text-anchor="middle" opacity="0.4">deployment</text>
<text class="ts" x="640" y="72" text-anchor="middle" opacity="0.4">path</text>

<!-- Vertical flow labels -->
<line x1="40" y1="86" x2="40" y2="510" stroke="#888" stroke-width="0.5" opacity="0.2"/>
<line x1="640" y1="86" x2="640" y2="510" stroke="#888" stroke-width="0.5" opacity="0.2"/>

<!-- Title -->
<text class="th" x="340" y="36" text-anchor="middle">CrowdRL package architecture</text>
<text class="ts" x="340" y="56" text-anchor="middle">arrows show dependency direction (depends on →)</text>

<!-- Legend -->
<g class="c-teal"><rect x="60" y="574" width="12" height="12" rx="2"/></g>
<text class="ts" x="78" y="585">shared code</text>
<g class="c-purple"><rect x="160" y="574" width="12" height="12" rx="2"/></g>
<text class="ts" x="178" y="585">training env</text>
<g class="c-blue"><rect x="260" y="574" width="12" height="12" rx="2"/></g>
<text class="ts" x="278" y="585">training loop</text>
<g class="c-coral"><rect x="360" y="574" width="12" height="12" rx="2"/></g>
<text class="ts" x="378" y="585">JPS adapter</text>
<g class="c-gray"><rect x="470" y="574" width="12" height="12" rx="2" stroke-dasharray="4 3"/></g>
<text class="ts" x="488" y="585">external (unmodified)</text>
</svg>