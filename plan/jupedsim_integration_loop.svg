<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<style>
  text { font-family: "Anthropic Sans", system-ui, -apple-system, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
  .ts { font-size: 12px; font-weight: 400; fill: #666; }
  .arr { stroke: #888; stroke-width: 1.5; }
  .leader { stroke: #888; stroke-width: 0.5; stroke-dasharray: 4 3; }

  /* Teal - shared core */
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }

  /* Blue - exported policy */
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
  .c-blue .th { fill: #0C447C; }
  .c-blue .ts { fill: #185FA5; }

  /* Gray - JuPedSim */
  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
  .c-gray .th { fill: #444441; }
  .c-gray .ts { fill: #5F5E5A; }
</style>

<text class="th" x="340" y="36" text-anchor="middle">Per-timestep loop inside JuPedSim (LearnedPolicyModel)</text>
<text class="ts" x="340" y="56" text-anchor="middle">crowdrl-core functions shown in teal — identical code to training</text>

<!-- Step 1: JuPedSim agent state -->
<g class="c-gray">
  <rect x="220" y="80" width="240" height="44" rx="8"/>
  <text class="th" x="340" y="102" text-anchor="middle" dominant-baseline="central">JuPedSim agent states</text>
</g>
<text class="ts" x="480" y="102" dominant-baseline="central" opacity="0.5">positions, velocities, goals</text>

<!-- Arrow down -->
<line x1="340" y1="124" x2="340" y2="148" class="arr" marker-end="url(#arrow)"/>

<!-- Step 2: Observation builder (crowdrl-core) -->
<g class="c-teal">
  <rect x="160" y="150" width="360" height="80" rx="8"/>
  <text class="th" x="340" y="174" text-anchor="middle" dominant-baseline="central">observation builder</text>
  <text class="ts" x="340" y="196" text-anchor="middle" dominant-baseline="central">ego state (7D) + K-NN social (56D) + raycasts (16D)</text>
  <text class="ts" x="340" y="214" text-anchor="middle" dominant-baseline="central">+ optional navmesh waypoint (3D)</text>
</g>
<text class="ts" x="538" y="190" dominant-baseline="central" opacity="0.5">crowdrl-core</text>

<!-- Arrow down -->
<line x1="340" y1="230" x2="340" y2="254" class="arr" marker-end="url(#arrow)"/>

<!-- Step 3: ONNX policy inference -->
<g class="c-blue">
  <rect x="220" y="256" width="240" height="44" rx="8"/>
  <text class="th" x="340" y="278" text-anchor="middle" dominant-baseline="central">ONNX policy inference</text>
</g>
<text class="ts" x="480" y="278" dominant-baseline="central" opacity="0.5">~0.1ms per agent</text>

<!-- Arrow down -->
<line x1="340" y1="300" x2="340" y2="324" class="arr" marker-end="url(#arrow)"/>

<!-- Step 4: Action interpreter (crowdrl-core) -->
<g class="c-teal">
  <rect x="160" y="326" width="360" height="64" rx="8"/>
  <text class="th" x="340" y="348" text-anchor="middle" dominant-baseline="central">action interpreter</text>
  <text class="ts" x="340" y="370" text-anchor="middle" dominant-baseline="central">4D action → desired velocity + torso angle + head angle</text>
</g>
<text class="ts" x="538" y="358" dominant-baseline="central" opacity="0.5">crowdrl-core</text>

<!-- Arrow down -->
<line x1="340" y1="390" x2="340" y2="414" class="arr" marker-end="url(#arrow)"/>

<!-- Step 5: JuPedSim simulation step -->
<g class="c-gray">
  <rect x="180" y="416" width="320" height="56" rx="8"/>
  <text class="th" x="340" y="436" text-anchor="middle" dominant-baseline="central">JuPedSim simulation step</text>
  <text class="ts" x="340" y="456" text-anchor="middle" dominant-baseline="central">collision resolution · position integration · routing</text>
</g>

<!-- Feedback arrow (loop back) -->
<path d="M500 444 L560 444 L560 102 L462 102" fill="none" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
<text class="ts" x="572" y="280" text-anchor="start" opacity="0.5" transform="rotate(90, 572, 280)">next timestep</text>

<!-- Legend -->
<rect class="c-teal" x="160" y="494" width="12" height="12" rx="2"/>
<text class="ts" x="178" y="505">crowdrl-core (shared with training)</text>
<rect class="c-blue" x="370" y="494" width="12" height="12" rx="2"/>
<text class="ts" x="388" y="505">exported policy</text>
<rect class="c-gray" x="520" y="494" width="12" height="12" rx="2"/>
<text class="ts" x="538" y="505">JuPedSim</text>
</svg>