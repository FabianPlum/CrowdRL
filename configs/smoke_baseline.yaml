# =============================================================================
# Baseline smoke (temporal memory disabled) for comparison with smoke_memory_optA
# =============================================================================
# Identical to smoke_memory_optA.yaml except use_temporal_memory=false (obs_dim
# 82 instead of 88). Used to confirm the memory plumbing does not regress the
# non-memory code path on the same seed and config.
#
# Usage:
#   uv run python train_mappo.py --config configs/smoke_baseline.yaml --gpus 1
#
# Outputs: results_smoke_baseline/
# =============================================================================


# ---------------------------------------------------------------------------
# Training schedule (small)
# ---------------------------------------------------------------------------
seed: 42
n_envs: 16                   # small footprint for fast startup
max_agents: 30               # cover the smoke-phase upper bound
# 80k agent-steps per collect ~= 500 env-steps * 10 avg agents * 16 envs, which is
# roughly one full episode per env per collect (max_steps=500). This is the minimum
# that actually produces completed episodes and therefore real PPO signal.
steps_per_collect: 80000
n_rollouts: 8                # 8 x full-episode collects -> ~128 completed episodes
log_interval: 1
compile_step: true           # test the compile path -- we just fixed ENAMETOOLONG on the fused memory kernel


# ---------------------------------------------------------------------------
# Curriculum -- only 2 phases, low thresholds so the run is deterministic
# ---------------------------------------------------------------------------
curriculum:
  metric_window: 20
  min_episodes_per_phase: 10000   # effectively: never advance during smoke

  phases:
    - name: smoke
      tiers: [TIER_0, TIER_1]
      agents: [8, 20]
      threshold: 0.0            # terminal


# ---------------------------------------------------------------------------
# Environment geometry
# ---------------------------------------------------------------------------
geometry:
  min_side: 8.0
  max_side: 12.0
  corridor_width: [2.0, 4.0]
  corridor_length: [8.0, 14.0]


# ---------------------------------------------------------------------------
# Observation -- baseline: no temporal memory
# ---------------------------------------------------------------------------
observation:
  use_navmesh: true
  use_temporal_memory: false   # the only material difference from smoke_memory_optA
  temporal_memory_window: 50


# ---------------------------------------------------------------------------
# Action limits
# ---------------------------------------------------------------------------
action:
  max_heading_change_deg: 15.0
  max_torso_change_deg: 15.0


# ---------------------------------------------------------------------------
# Reward (same as full_training for signal parity)
# ---------------------------------------------------------------------------
reward:
  goal_bonus: 20.0
  collision_penalty: -1.0
  timeout_penalty: -10.0
  existence_penalty: -0.01
  progress_weight: 1.5
  inverse_distance_weight: 0.0
  speed_deviation_weight: 0.0
  use_smoothness: true
  wall_proximity_penalty: -0.1
  wall_proximity_threshold: 1.5
  agent_proximity_penalty_near: -0.01
  agent_proximity_penalty_far: -0.0001
  personal_space_radius: 1.0
  action_rate_weight: -0.01


# ---------------------------------------------------------------------------
# Episode
# ---------------------------------------------------------------------------
max_steps: 500               # shorter episodes (5s at dt=0.01) so more completions per collect

episode:
  stuck_termination_enabled: true
  stuck_window_steps: 150
  stuck_progress_threshold: 0.2


# ---------------------------------------------------------------------------
# Network architecture
# ---------------------------------------------------------------------------
network:
  actor_hidden: [256, 256]
  critic_hidden: [256, 256]


# ---------------------------------------------------------------------------
# PPO hyperparameters
# ---------------------------------------------------------------------------
ppo:
  lr_actor: 5.0e-4
  lr_critic: 5.0e-4
  n_epochs: 4                # fewer epochs = faster update
  clip_epsilon: 0.2
  gamma: 0.99
  gae_lambda: 0.95
  target_kl: 0.02
  lr_schedule: constant


# ---------------------------------------------------------------------------
# Evaluation
# ---------------------------------------------------------------------------
eval:
  n_episodes: 2
  agent_range: [8, 15]
  render_video: false        # skip rendering for smoke, saves time
  video_scenario: 0
