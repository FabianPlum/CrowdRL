[project]
name = "crowdrl-train"
version = "0.1.0"
description = "MAPPO training infrastructure for CrowdRL"
requires-python = ">=3.12"
dependencies = [
    "crowdrl-env",
    "torch>=2.0",
    "tensorboard>=2.14",
    "onnxscript>=0.6.2",
]

[project.optional-dependencies]
export = ["onnx>=1.14"]
verify = ["onnxruntime>=1.15"]

[project.scripts]
crowdrl-train = "crowdrl_train.train:main"

[tool.uv.sources]
crowdrl-env = { workspace = true }
torch = { index = "pytorch-cu126" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/crowdrl_train"]
