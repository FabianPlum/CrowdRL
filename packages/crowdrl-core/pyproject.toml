[project]
name = "crowdrl-core"
version = "0.1.0"
description = "Shared geometry, perception, and action library for CrowdRL — no RL or JuPedSim dependencies"
requires-python = ">=3.12"
dependencies = [
    "numpy>=2.0",
    "shapely>=2.0",
    "scipy>=1.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov",
    "ruff",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/crowdrl_core"]
