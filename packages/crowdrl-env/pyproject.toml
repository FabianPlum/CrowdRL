[project]
name = "crowdrl-env"
version = "0.1.0"
description = "Gymnasium training environment for CrowdRL"
requires-python = ">=3.12"
dependencies = [
    "crowdrl-core",
    "gymnasium>=1.0",
    "matplotlib>=3.8",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov",
    "ruff",
]
notebooks = [
    "jupyter>=1.1",
    "ipykernel>=7.0",
]

[tool.uv.sources]
crowdrl-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/crowdrl_env"]
