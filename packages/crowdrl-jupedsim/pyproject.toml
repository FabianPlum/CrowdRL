[project]
name = "crowdrl-jupedsim"
version = "0.1.0"
description = "JuPedSim integration adapter for learned CrowdRL policies"
requires-python = ">=3.12"
dependencies = [
    "crowdrl-core",
    "jupedsim>=1.0",
    "onnxruntime>=1.17",
]

[tool.uv.sources]
crowdrl-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/crowdrl_jupedsim"]
